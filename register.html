<!DOCTYPE html> <!-- 🔵 HTML5 -->

<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Inscription</title>

<!-- 🔵 STYLE (DESIGN) -->
<style>

body {
background: linear-gradient(to right, #4facfe, #00f2fe);
/* 🔵 Dégradé bleu */
font-family: Arial; /* 🔵 Police */
display: flex; /* 🔵 Centre le contenu */
justify-content: center;
align-items: center;
height: 100vh; /* 🔵 Hauteur écran */
}

.container {
background: white; /* 🔵 Fond blanc */
padding: 30px; /* 🔵 Espace intérieur */
border-radius: 10px; /* 🔵 Coins arrondis */
box-shadow: 0px 0px 10px gray; /* 🔵 Ombre */
width: 300px;
}

h1 {
text-align: center;
}

input, select {
width: 100%; /* 🔵 Prend toute la largeur */
padding: 10px;
margin: 5px 0;
}

button {
width: 100%;
padding: 10px;
background: #4facfe; /* 🔵 Couleur bouton */
color: white;
border: none;
border-radius: 5px;
cursor: pointer;
}

button:hover {
background: #00c6ff; /* 🔵 Effet au survol */
}

</style>

</head>

<body>

<div class="container"> <!-- 🔵 Boîte centrale -->

<h1>Inscription</h1>

<form>

<label>Nom :</label>
<input type="text" placeholder="Votre nom" required>

<label>Email :</label>
<input type="email" placeholder="Votre email" required>

<label>Mot de passe :</label>
<input type="password" placeholder="Mot de passe" required>

<label>Rôle :</label>
<select>
<option>Client</option>
<option>Prestataire</option>
</select>

<br><br>

<button type="submit">S'inscrire</button>

</form>

</div>

</body>

</html>
