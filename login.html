<!DOCTYPE html>

<html lang="fr">

<head>
<meta charset="UTF-8">
<title>Connexion</title>

<style>

body {
background: linear-gradient(to right, #667eea, #764ba2);
font-family: Arial;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

.box {
background: white;
padding: 30px;
border-radius: 10px;
width: 300px;
box-shadow: 0px 0px 10px gray;
}

input {
width: 100%;
padding: 10px;
margin: 10px 0;
}

button {
width: 100%;
padding: 10px;
background: #667eea;
color: white;
border: none;
cursor: pointer;
}

button:hover {
background: #5a67d8;
}

a {
display: block;
text-align: center;
margin-top: 10px;
}

</style>

</head>

<body>

<div class="box">

<h1>Connexion</h1>

<form>

<label>Email :</label>
<input type="email" required>

<label>Mot de passe :</label>
<input type="password" required>

<button type="submit">Se connecter</button>

</form>

<a href="#">Mot de passe oublié ?</a>

</div>

</body>

</html>
